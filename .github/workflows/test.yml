name: "Run MC/DC Tests on Push"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean compile

      - name: Run Tests
        run: mvn test

      - name: Generate Coverage Report
        run: mvn jacoco:report

      - name: Generate Test Report
        if: always()
        run: mvn surefire-report:report-only

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/surefire-report.html

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Test Summary
        if: always()
        run: |
          echo "## 📊 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Execution" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/*.xml ]; then
            echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📁 **Test Reports Available:**" >> $GITHUB_STEP_SUMMARY
            echo "- JUnit Test Results (XML)" >> $GITHUB_STEP_SUMMARY
            echo "- Surefire HTML Report" >> $GITHUB_STEP_SUMMARY
            echo "- JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Test reports not found" >> $GITHUB_STEP_SUMMARY
          fi